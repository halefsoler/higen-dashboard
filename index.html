<style>

<body>
<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Carregando dados do Google Drive...</div>
  </div>
</div>

<script>
const FILE_ID = '1cHvc9kr7EnXME3FDCf8JCxLHcBRAWH9H9DUQ319y51k';
const MONTHS = ['M0','M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12','M13','M14','M15','M16','M17','M18','M19','M20','M21','M22','M23','M24','M25','M26','M27','M28','M29','M30','M31','M32','M33','M34','M35','M36'];

function parseRow(line) { if(!line||!line.includes('|'))return[]; return line.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1); }
function parseBRL(v) { if(!v||v==='-'||v==='\\-'||v===''||v==='\u2013')return 0; let s=v.replace(/R\$\s*/g,'').replace(/\\/g,'').replace(/\./g,'').replace(',','.').replace(/[()]/g,m=>m==='('?'-':'').replace(/\s/g,''); let n=parseFloat(s); return isNaN(n)?0:n; }
function parsePct(v) { if(!v||v==='-')return 0; let s=v.replace(/[()%\\]/g,'').replace(',','.'); let n=parseFloat(s); return isNaN(n)?0:n; }
function fmt(n) { if(Math.abs(n)>=1e6)return'R$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3)return'R$'+(n/1e3).toFixed(0)+'K'; return'R$'+Math.round(n); }
function fmtUSD(n) { if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(0)+'K'; return'$'+Math.round(n); }
function fmtN(n) { if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+'K'; return Math.round(n).toLocaleString('pt-BR'); }
function findRow(lines,kw) { for(let i=0;i<lines.length;i++){if(lines[i].includes(kw))return lines[i];} return null; }
function extractMonthlyValues(line,si) { let c=parseRow(line); return c.slice(si).map(parseBRL); }

(async function() {
  try {
    // Standalone mode: fetch from published Google Sheets
    const sheetsUrl = 'https://docs.google.com/spreadsheets/d/' + FILE_ID + '/export?format=tsv&gid=0';
    let res;
    if (window.cowork && window.cowork.callMcpTool) {
      res = await window.cowork.callMcpTool('mcp__3c483589-dbd4-4b5e-b255-73b2de0dde21__read_file_content', { fileId: FILE_ID });
    } else {
      // Fetch all sheets as one text block via published URL
      const response = await fetch('https://docs.google.com/spreadsheets/d/' + FILE_ID + '/gviz/tq?tqx=out:csv');
      if (!response.ok) throw new Error('Publique a planilha primeiro: Arquivo > Compartilhar > Publicar na web');
      const csvText = await response.text();
      // Convert CSV to pipe-delimited format for compatibility
      const csvLines = csvText.split('\n');
      const pipeLines = csvLines.map(line => {
        // Simple CSV to pipe: split by comma (handling quoted fields)
        const cells = [];
        let current = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQuote = !inQuote; }
          else if (ch === ',' && !inQuote) { cells.push(current.trim()); current = ''; }
          else { current += ch; }
        }
        cells.push(current.trim());
        return '| ' + cells.join(' | ') + ' |';
      });
      res = { content: [{ text: pipeLines.join('\n') }] };
    }
    let content = '';
    if (res.structuredContent && res.structuredContent.fileContent) content = res.structuredContent.fileContent;
    else if (res.content && Array.isArray(res.content)) content = res.content.map(c => c.text||'').join('');
    else if (typeof res === 'string') content = res;
    if (!content) throw new Error('Arquivo vazio ou formato inesperado');
    const lines = content.split('\n');

    const mrrLine = findRow(lines,'MRR Total (Subscri');
    const marginLine = findRow(lines,'Margem EBITDA');
    const freeLine = findRow(lines,'Usu\u00E1rios Free \u2014 Fechamento');
    const hireLine = findRow(lines,'Usu\u00E1rios Hire \u2014 Fechamento');
    const plusLine = findRow(lines,'Usu\u00E1rios Plus \u2014 Fechamento');
    const proLine = findRow(lines,'Usu\u00E1rios Pro \u2014 Fechamento');
    const totalPayLine = findRow(lines,'Total Usu\u00E1rios Pagantes (Fechamento)');
    const arpuLine = findRow(lines,'ARPU (Receita/Usu\u00E1rio Pagante)');
    const saldoLine = findRow(lines,'Saldo Acumulado de Caixa');
    const infraLine = findRow(lines,'Custos de Infra (modelo unit');
    const ltvHireLine = findRow(lines,'LTV Plano Hire');
    const ltvPlusLine = findRow(lines,'LTV Plano Plus');
    const ltvProLine = findRow(lines,'LTV Plano Pro');
    const cacLine = findRow(lines,'CAC (Spend MKT');
    const ltvcacLine = findRow(lines,'LTV : CAC');
    const recTotalAnualLine = findRow(lines,'Receita Total Anual (Gross');
    const cogsLine = findRow(lines,'COGS (Custos de Infra');

    const recAcumLine = findRow(lines,'Receita Total Acumulada no Ano');
    const baseFreeAnualLine = findRow(lines,'Base Free (Fim de Ano)');
    const pagAnualLine = findRow(lines,'Usu\u00E1rios Pagantes (Fim de Ano)');
    const convRateLine = findRow(lines,'Taxa Convers\u00E3o Efetiva Free');
    const spendMktLine = findRow(lines,'Spend Marketing Total');
    const novosPagLine = findRow(lines,'Novos Pagantes no Ano');
    const cacPaybackLine = findRow(lines,'CAC Payback');
    const grossProfitLine = findRow(lines,'Gross Profit (Lucro Bruto)');
    const grossMarginLine = findRow(lines,'Gross Margin');
    const arpuAnualLine = findRow(lines,'ARPU mensal (Receita/Usu');

    const mrr=extractMonthlyValues(mrrLine,2), free=extractMonthlyValues(freeLine,2);
    const hire=extractMonthlyValues(hireLine,2), plus=extractMonthlyValues(plusLine,2);
    const pro=extractMonthlyValues(proLine,2), totalPay=extractMonthlyValues(totalPayLine,2);
    const arpu=extractMonthlyValues(arpuLine,2), infra=extractMonthlyValues(infraLine,2);
    const saldo=extractMonthlyValues(saldoLine,7);
    const margin=[]; if(marginLine){parseRow(marginLine).slice(1).forEach(c=>margin.push(parsePct(c)));}

    const llmBase=8.0,scaleDiscounts=[];
    for(let m=0;m<=36;m++){let d=0;if(m<=3)d=0;else if(m<=6)d=0.03;else if(m<=9)d=0.06;else if(m<=12)d=0.10;else if(m<=18)d=0.13;else if(m<=24)d=0.14;else if(m<=30)d=0.15;else d=0.16;scaleDiscounts.push(d);}
    const llmUnitCosts=scaleDiscounts.map(d=>llmBase*(1-d));

    const ltvHire=ltvHireLine?parseBRL(parseRow(ltvHireLine)[2]):0;
    const ltvPlus=ltvPlusLine?parseBRL(parseRow(ltvPlusLine)[2]):0;
    const ltvPro=ltvProLine?parseBRL(parseRow(ltvProLine)[2]):0;
    const cacArr=cacLine?parseRow(cacLine).slice(2,5).map(parseBRL):[0,0,0];
    const ltvcacArr=ltvcacLine?parseRow(ltvcacLine).slice(2,5).map(v=>parseFloat(v.replace(/[x,]/g,'.'))||0):[0,0,0];
    const recAnual=recTotalAnualLine?parseRow(recTotalAnualLine).slice(2,5).map(parseBRL):[0,0,0];
    const cogsAnual=cogsLine?parseRow(cogsLine).slice(2,5).map(parseBRL):[0,0,0];

    const recAcum=recAcumLine?parseRow(recAcumLine).slice(2,5).map(parseBRL):[0,0,0];
    const baseFreeAnual=baseFreeAnualLine?parseRow(baseFreeAnualLine).slice(2,5).map(parseBRL):[0,0,0];
    const pagAnual=pagAnualLine?parseRow(pagAnualLine).slice(2,5).map(parseBRL):[0,0,0];
    const convRate=convRateLine?parseRow(convRateLine).slice(2,5).map(v=>parsePct(v)):[0,0,0];
    const spendMkt=spendMktLine?parseRow(spendMktLine).slice(2,5).map(parseBRL):[0,0,0];
    const novosPag=novosPagLine?parseRow(novosPagLine).slice(2,5).map(parseBRL):[0,0,0];
    const cacPayback=cacPaybackLine?parseRow(cacPaybackLine).slice(2,5).map(v=>parseFloat(v.replace(/[,\\]/g,'.'))||0):[0,0,0];
    const grossProfit=grossProfitLine?parseRow(grossProfitLine).slice(2,5).map(parseBRL):[0,0,0];
    const grossMarginPct=grossMarginLine?parseRow(grossMarginLine).slice(2,5).map(v=>parsePct(v)):[0,0,0];
    const arpuAnual=arpuAnualLine?parseRow(arpuAnualLine).slice(2,5).map(parseBRL):[0,0,0];

    // Fluxo de Caixa data
    const fcCaptLine = findRow(lines,'Capta\u00E7\u00E3o Pre-Seed');
    const fcReceitaLine = findRow(lines,'Receita Operacional (MRR)');
    const fcTotalEntLine = findRow(lines,'TOTAL ENTRADAS');
    const fcFolhaLine = findRow(lines,'(-) Folha / People');
    const fcAdminLine = findRow(lines,'(-) Backoffice / Admin');
    const fcMktLine = findRow(lines,'(-) MarTech');
    const fcInfraLine = findRow(lines,'(-) Custos de Infra');
    const fcImpostosLine = findRow(lines,'(-) Impostos sobre NFs');
    const fcTotalSaiLine = findRow(lines,'TOTAL SA\u00CDDAS');
    const fcFluxoLine = findRow(lines,'Fluxo L\u00EDquido Mensal');

    const fcCapt=fcCaptLine?extractMonthlyValues(fcCaptLine,7):new Array(37).fill(0);

      const sRow='<tr class="total-row" style="background:#EAF3DE;"><td><strong style="color:#0F6E56;">Saldo Acumulado</strong></td><td class="num pos">'+fmt(saldoQ[0])+'</td><td class="num pos">'+fmt(saldoQ[1])+'</td><td class="num pos">'+fmt(saldoQ[2])+'</td><td class="num pos">'+fmt(saldoQ[3])+'</td><td class="num pos"><strong>'+fmt(saldoQ[3])+'</strong></td><td class="num pos"><strong>'+fmt(saldoQ[7])+'</strong></td><td class="num pos"><strong>'+fmt(saldoQ[11])+'</strong></td></tr>';
      h+=sRow;
      tb.innerHTML=h;
    })();

    // 4. Scenarios chart
    (function(){
      const optData=saldo.map(v=>(v||0)*1.0+((v||0)*0.35*(saldo.indexOf(v)/36)));
      const consData=saldo.map((v,i)=>Math.max(0,(v||0)*(1-0.30*i/36)));
      // Better scenario calc: optimistic = +20% receita impact, conservative = -30%
      const opt=[], cons=[], base=[];
      let sOpt=0, sCons=0;
      for(let m=0;m<=36;m++){
        const ent=(fcCapt[m]||0)+(fcReceita[m]||0);
        const sai=(fcFolha[m]||0)+(fcMkt[m]||0)+(fcImpostos[m]||0)+(fcInfra[m]||0)+(fcAdmin[m]||0);
        const entOpt=(fcCapt[m]||0)+(fcReceita[m]||0)*1.20;
        const entCons=(fcCapt[m]||0)+(fcReceita[m]||0)*0.70;
        sOpt+=(entOpt-sai); sCons+=(entCons-sai);
        opt.push(sOpt); cons.push(Math.max(0,sCons)); base.push(saldo[m]||0);
      }
      new Chart(document.getElementById('chartScenarios'),{type:'line',data:{labels:MONTHS,datasets:[{label:'Otimista (+20%)',data:opt,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.06)',fill:true,tension:0.3,pointRadius:0,borderWidth:2},{label:'Base',data:base,borderColor:'#534AB7',tension:0.3,pointRadius:0,borderWidth:2.5},{label:'Conservador (-30%)',data:cons,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,0.06)',fill:true,tension:0.3,pointRadius:0,borderWidth:2,borderDash:[6,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:12}},y:{ticks:{callback:v=>fmt(v)}}}}});
    })();

    const arrData=mrrData.map(v=>v*12);
    new Chart(document.getElementById('chartARR'),{type:'line',data:{labels:mLabels,datasets:[{data:arrData,borderColor:'#534AB7',backgroundColor:'rgba(83,74,183,0.1)',fill:true,tension:0.3,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:12}},y:{title:{display:true,text:'ARR (R$)'},ticks:{callback:v=>fmt(v)}}}}});

    new Chart(document.getElementById('chartMix'),{type:'bar',data:{labels:['M12','M24','M36'],datasets:[{label:'Hire',data:[hire[m12],hire[m24],hire[m36]],backgroundColor:'#534AB7'},{label:'Plus',data:[plus[m12],plus[m24],plus[m36]],backgroundColor:'#D85A30'},{label:'Pro',data:[pro[m12],pro[m24],pro[m36]],backgroundColor:'#1D9E75'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{usePointStyle:true,pointStyle:'rect',boxWidth:10}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtN(v)}}}}});

    initCapTable();

  } catch(err) {
    document.getElementById('app').innerHTML = `<div class="error">Erro ao carregar: ${err.message}</div>`;
  }
})();

function showTab(id,btn){
